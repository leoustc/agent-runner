name: build-deb

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Debian Package
        run: make build

      - name: Upload Debian Artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-runner-deb
          path: dist/*.deb
          if-no-files-found: error
